name: Validation Checks

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate SDK
        uses: ./.github/actions/validate-sdk
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
