overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Add HTTP-Referer and X-OpenRouter-Title as global parameters
  version: 0.0.0
actions:
  # Add global parameters for app identification
  - target: $
    description: Add x-speakeasy-globals for HTTP-Referer, X-OpenRouter-Title, and X-OpenRouter-Categories headers
    update:
      x-speakeasy-globals:
        parameters:
          - $ref: "#/components/parameters/AppIdentifier"
          - $ref: "#/components/parameters/AppDisplayName"
          - $ref: "#/components/parameters/AppCategories"

  # Add component parameters
  - target: $.components
    description: Add parameters for app identification headers
    update:
      parameters:
        AppIdentifier:
          name: HTTP-Referer
          in: header
          schema:
            type: string
          description: |
            The app identifier should be your app's URL and is used as the primary identifier for rankings.
            This is used to track API usage per application.
        AppDisplayName:
          name: X-OpenRouter-Title
          in: header
          x-speakeasy-name-override: appTitle
          schema:
            type: string
          description: |
            The app display name allows you to customize how your app appears in OpenRouter's dashboard.
        AppCategories:
          name: X-OpenRouter-Categories
          in: header
          x-speakeasy-name-override: appCategories
          schema:
            type: string
          description: |
            Comma-separated list of app categories (e.g. "cli-agent,cloud-agent"). Used for marketplace rankings.

  # Add header parameters to all paths so Speakeasy matches them with globals
  - target: $.paths[*]
    description: Reference app identification headers on all paths so Speakeasy injects them via globals
    update:
      parameters:
        - $ref: "#/components/parameters/AppIdentifier"
        - $ref: "#/components/parameters/AppDisplayName"
        - $ref: "#/components/parameters/AppCategories"

  # Hide app-identification globals on STT/TTS so the body remains the only
  # method argument while constructor-level headers still apply.
  - target: $.paths["/audio/transcriptions"].parameters
    description: Drop $ref-based header params on STT so only the hidden inlines remain
    remove: true

  - target: $.paths["/audio/speech"].parameters
    description: Drop $ref-based header params on TTS so only the hidden inlines remain
    remove: true

  - target: $.paths["/audio/transcriptions"]
    description: Add hidden app-identification headers on STT so globals still apply but the method signature stays flat
    update:
      parameters:
        - name: HTTP-Referer
          in: header
          x-speakeasy-globals-hidden: true
          schema:
            type: string
        - name: X-OpenRouter-Title
          in: header
          x-speakeasy-name-override: appTitle
          x-speakeasy-globals-hidden: true
          schema:
            type: string
        - name: X-OpenRouter-Categories
          in: header
          x-speakeasy-name-override: appCategories
          x-speakeasy-globals-hidden: true
          schema:
            type: string

  - target: $.paths["/audio/speech"]
    description: Add hidden app-identification headers on TTS so globals still apply but the method signature stays flat
    update:
      parameters:
        - name: HTTP-Referer
          in: header
          x-speakeasy-globals-hidden: true
          schema:
            type: string
        - name: X-OpenRouter-Title
          in: header
          x-speakeasy-name-override: appTitle
          x-speakeasy-globals-hidden: true
          schema:
            type: string
        - name: X-OpenRouter-Categories
          in: header
          x-speakeasy-name-override: appCategories
          x-speakeasy-globals-hidden: true
          schema:
            type: string
